name: Daily Feed Update

on:
  schedule:
    # 05:00 UTC = 07:00 CEST (summer) / 06:00 CET (winter) — Sweden local morning
    - cron: '0 5 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab (useful for testing)

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run feed updater
        id: updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/update_feed.py
          # Check if news.json changed
          if git diff --quiet src/data/news.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            COUNT=$(git diff src/data/news.json | grep -c '^\+  {' || true)
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push to main
        if: steps.updater.outputs.changed == 'true'
        run: |
          DATE=$(date +%Y-%m-%d)
          COUNT=${{ steps.updater.outputs.count }}

          git config user.name "The Orbital Bot"
          git config user.email "bot@theorbital.net"

          git add src/data/news.json
          git commit -m "feed: auto-add ${COUNT} article(s) (${DATE})"
          git push origin main
