name: Daily Feed Update

on:
  schedule:
    # 07:00 UTC daily — catches overnight articles from US/Europe/Global
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab (useful for testing)

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run feed updater
        id: updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/update_feed.py
          # Check if news.json changed
          if git diff --quiet src/data/news.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            COUNT=$(git diff src/data/news.json | grep -c '^\+  {' || true)
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.updater.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="feed-update-${DATE}"
          COUNT=${{ steps.updater.outputs.count }}

          git config user.name "The Orbital Bot"
          git config user.email "bot@theorbital.net"

          # Delete branch if it already exists (e.g. re-run on same day)
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          git add src/data/news.json
          git commit -m "feed: auto-add ${COUNT} article(s) (${DATE})"
          git push origin "$BRANCH"

          gh pr create \
            --title "Feed update: ${COUNT} article(s) — ${DATE}" \
            --body "$(cat <<'EOF'
          Automated daily feed update from The Orbital bot.

          **Before merging:**
          - Check each article is genuinely relevant
          - Spot-check orientation assignments (GARDEN / SPACESHIP / MYSTERIES / ASSEMBLY)
          - Verify summaries are accurate and not too vague
          - Add actor slugs manually if any key organisations appear

          Cloudflare will auto-deploy ~60 seconds after merge.
          EOF
          )" \
            --base main \
            --head "$BRANCH"
